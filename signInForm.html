    <form
      action="#"
      class="signIn-form d-flex flex-column align-self-center justify-content-center z-3"
      id="sign-In-form"
    >
      <h1 class="text-light mb-5">Smart Login System</h1>
      <label for="input-name" class="text-light">Name</label>
      <input
        type="text"
        placeholder="Enter your Name"
        id="input-name"
        id="validationTooltip01"
        class="p-2 border border-0 rounded-1 form-control"
        required
      />
      <label for="email-input" class="text-light">Email</label>
      <input
        type="email"
        placeholder="Enter your email"
        id="email-input"
        class="p-2 border border-0 rounded-1 form-control"
        required
      />
      <label for="password-input" class="text-light">Password</label>
      <input
        type="password"
        placeholder="Enter your password"
        id="password-input"
        class="p-2 border border-0 rounded-1 form-control"
      /><input
        type="submit"
        value="Sign In"
        class="sign-in-btn mt-4 p-3 fw-bolder"
        required
      />
      <p class="text-light text-center mt-3">
        Smart Login System?
        <a class="text-light fw-bolder" href="index.html">log In</a>
      </p>
    </form>
