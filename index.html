<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="logIn">
    <img
      src="background-imges/secondeOne.png"
      class="bk0images"
      width="173px"
      height="94px"
    /><img
      src="background-imges/secondeOne.png"
      width="262px"
      height="262px"
      class="bk1images"
    /><img
      src="background-imges/sevenOne.png"
      width="475px"
      height="442px"
      class="bk2images"
    />
    <img
      src="background-imges/sevenOne.png"
      width="475px"
      height="442px"
      class="bk6images"
    />
    <img
      src="background-imges/fourthOne.png"
      width="162px"
      height="107px"
      class="bk4images"
    />
    <img
      src="background-imges/sevenOne.png"
      width="145px"
      height="145px"
      class="bk5images"
    />
    <img
      src="background-imges/sevenOne.png"
      width="475px"
      height="140px"
      class="bk7images"
    />
    <img
      src="background-imges/aithOne.png"
      width="514px"
      height="165px"
      class="bk8images"
    />
    <img
      src="background-imges/sevenOne.png"
      width="475px"
      height="140px"
      class="bk9images"
    />
    <form
      action="#"
      class="needs-validation d-flex flex-column align-self-center justify-content-center z-3"
      id="regestirForm"
    >
      <h1 class="text-light">Smart Login System</h1>
      <label for="login-email-Input" class="text-light">Email</label>
      <input
        type="email"
        required
        placeholder="Enter your email"
        id="login-email-Input"
        class="p-2 border border-0 rounded-1 form-control"
      />
      <label for="login-password-Input" class="text-light">Password</label>
      <input
        type="password"
        required
        placeholder="Enter your password"
        pattern=".{8,}"
        id="login-password-Input"
        class="p-2 border border-0 rounded-1 form-control"
      />
      <p
        id="error-messges"
        class="message-error text-danger p-1 mt-1 fw-bolder"
      ></p>
      <input
        type="submit"
        value="Log In"
        id="submit-Input"
        class="login-btn mt-4 p-3 fw-bolder"
      />
      <p class="text-light text-center mt-3">
        You have an account?
        <a href="signInForm.html" class="text-light fw-bolder">Sign In</a>
      </p>
    </form>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="script.js"></script>
</html>
